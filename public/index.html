<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weerweather</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-panel: #121214;
            --border-color: #27272a;
            --text-main: #f4f4f5;
            --text-mute: #71717a;
            --control-bg: #1e1e2f;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #09090b; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .leaflet-container { background: #09090b; }
        
        .strike-x-icon {
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            color: #ffffff;
            transition: color 0.5s ease;
        }

        #control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 240px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            z-index: 1000;
            font-size: 11px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }

        .panel-section {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .panel-section:last-child {
            border-bottom: none;
        }

        .section-header {
            color: var(--text-mute);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 9px;
            letter-spacing: 0.05em;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .control-row:last-child {
            margin-bottom: 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 16px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #27272a; transition: 0.1s; border-radius: 2px;
            border: 1px solid var(--border-color);
        }
        .slider:before {
            position: absolute; content: ""; height: 10px; width: 10px; left: 2px; bottom: 2px;
            background-color: var(--text-mute); transition: 0.1s; border-radius: 1px;
        }
        input:checked + .slider { background-color: var(--text-main); border-color: var(--text-main); }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--bg-panel); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: #27272a;
            outline: none;
            margin: 8px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px;
            height: 10px;
            background: var(--text-main);
            cursor: pointer;
            border-radius: 1px;
        }

        #play-btn {
            background: #18181b;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 2px 6px;
            border-radius: 2px;
            cursor: pointer;
            font-family: inherit;
            font-size: 9px;
            text-transform: uppercase;
        }
        #play-btn:hover { background: #27272a; }
        #play-btn:active { background: #09090b; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="control-panel">
        <div class="panel-section">
            <div class="section-header">Layers</div>
            <div class="control-row">
                <span>Rain Radar</span>
                <label class="switch">
                    <input type="checkbox" id="layer-radar" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="control-row">
                <span>Lightning</span>
                <label class="switch">
                    <input type="checkbox" id="layer-lightning" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-header">Lightning History</div>
            <div class="slider-label">
                <span>Max Age</span>
                <span id="lightning-age-val" style="font-weight: bold;">15m</span>
            </div>
            <input type="range" id="lightning-age-slider" min="1" max="15" value="15">
        </div>

        <div class="panel-section">
            <div class="section-header">Radar Timeline</div>
            <div class="slider-label">
                <span id="radar-timestamp" style="font-weight: bold;">--:--</span>
                <button id="play-btn" disabled>Play</button>
            </div>
            <input type="range" id="radar-timeline" min="0" max="0" value="0" step="1" disabled>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false, preferCanvas: true }).setView([50.29, 18.66], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const lightningLayer = L.layerGroup().addTo(map);
        
        let radarFrames = [];
        let radarLayers = []; 
        
        let lightningStrikes = []; 
        let maxAgeMs = 15 * 60 * 1000; 
        let displayAgeMs = 15 * 60 * 1000; 

        // --- 1. Viewport Culling & Color Logic (The Anti-Lag Engine) ---
        const lightningAgeSlider = document.getElementById('lightning-age-slider');
        const lightningAgeVal = document.getElementById('lightning-age-val');
        const layerLightningCheckbox = document.getElementById('layer-lightning');

        lightningAgeSlider.addEventListener('input', (e) => {
            lightningAgeVal.innerText = `${e.target.value}m`;
            displayAgeMs = parseInt(e.target.value) * 60 * 1000;
            updateLightningViewport();
        });

        layerLightningCheckbox.addEventListener('change', updateLightningViewport);
        map.on('moveend', updateLightningViewport); 

        function updateLightningViewport() {
            const now = Date.now();
            const bounds = map.getBounds();
            const isLayerEnabled = layerLightningCheckbox.checked;

            for (let i = lightningStrikes.length - 1; i >= 0; i--) {
                const strike = lightningStrikes[i];
                const age = now - strike.timestamp;

                // 1. Hard cache eviction
                if (age > maxAgeMs) {
                    if (strike.marker) lightningLayer.removeLayer(strike.marker);
                    lightningStrikes.splice(i, 1);
                    continue;
                }

                // 2. Spatial & Temporal check
                const isVisibleTime = age <= displayAgeMs;
                const isVisibleSpace = bounds.contains([strike.lat, strike.lon]);

                if (isVisibleTime && isVisibleSpace && isLayerEnabled) {
                    // Mount marker if missing
                    if (!strike.marker) {
                        const markerIcon = L.divIcon({ className: 'strike-x-icon', html: '×', iconSize: [12, 12], iconAnchor: [6, 6] });
                        strike.marker = L.marker([strike.lat, strike.lon], { icon: markerIcon });
                        strike.marker.addTo(lightningLayer);
                    }
                    
                    // Paint color
                    const element = strike.marker.getElement();
                    if (element) {
                        const ratio = age / displayAgeMs; 
                        const g = Math.round(255 * (1 - ratio));
                        const b = Math.round(255 * (1 - ratio));
                        element.style.color = `rgb(255, ${g}, ${b})`;
                    }
                } else {
                    // Unmount marker to save RAM
                    if (strike.marker) {
                        lightningLayer.removeLayer(strike.marker);
                        strike.marker = null;
                    }
                }
            }
        }

        // Run sweep every 1s
        setInterval(updateLightningViewport, 1000);

        // --- 2. Live Websocket Setup ---
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.port === '5500' ? 'localhost:3000' : window.location.host;
        const ws = new WebSocket(`${protocol}//${wsHost}`);

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.type === 'history') {
                // Populate historical buffer immediately on reload
                lightningStrikes = msg.data.map(strike => ({
                    lat: strike.lat,
                    lon: strike.lon,
                    timestamp: strike.timestamp,
                    marker: null
                }));
                updateLightningViewport();
            } else if (msg.type === 'strike') {
                // Parse live strikes
                lightningStrikes.push({
                    lat: msg.lat,
                    lon: msg.lon,
                    timestamp: msg.timestamp,
                    marker: null
                });
                updateLightningViewport();
            }
        };

        // --- 3. Local-Proxy Pre-cached Radar Engine ---
        const radarTimeline = document.getElementById('radar-timeline');
        const radarTimestamp = document.getElementById('radar-timestamp');
        const playBtn = document.getElementById('play-btn');
        const layerRadarCheckbox = document.getElementById('layer-radar');

        let isPlaying = false;
        let playInterval = null;

        async function initRadar() {
            try {
                // Hit local server API to avoid CORS and rate limits
                const res = await fetch('/api/radar/metadata');
                const data = await res.json();
                
                radarFrames = data.radar.past;
                radarTimeline.max = radarFrames.length - 1;
                radarTimeline.value = radarFrames.length - 1;
                
                // Pre-cache all frames through our local secure proxy
                radarFrames.forEach((frame) => {
                    const layer = L.tileLayer(`/api/radar/tile${frame.path}/512/{z}/{x}/{y}/2/1_1.png`, {
                        opacity: 0,
                        maxNativeZoom: 7,
                        transparent: true
                    }).addTo(map);
                    radarLayers.push(layer);
                });

                radarTimeline.disabled = false;
                playBtn.disabled = false;

                function setRadarFrame(index) {
                    if (!layerRadarCheckbox.checked) return;
                    
                    // Instant opacity swap
                    radarLayers.forEach((layer, i) => {
                        layer.setOpacity(i === parseInt(index) ? 0.65 : 0);
                    });
                    
                    const date = new Date(radarFrames[index].time * 1000);
                    radarTimestamp.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                }

                radarTimeline.addEventListener('input', (e) => {
                    if (isPlaying) stopLoop();
                    setRadarFrame(e.target.value);
                });

                layerRadarCheckbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        setRadarFrame(radarTimeline.value);
                    } else {
                        radarLayers.forEach(layer => layer.setOpacity(0));
                        radarTimestamp.innerText = '--:--';
                    }
                });

                function runLoop() {
                    isPlaying = true;
                    playBtn.innerText = 'Pause';
                    playInterval = setInterval(() => {
                        let next = parseInt(radarTimeline.value) + 1;
                        if (next >= radarFrames.length) next = 0;
                        radarTimeline.value = next;
                        setRadarFrame(next);
                    }, 1000);
                }

                function stopLoop() {
                    isPlaying = false;
                    playBtn.innerText = 'Play';
                    clearInterval(playInterval);
                }

                playBtn.addEventListener('click', () => isPlaying ? stopLoop() : runLoop());
                
                setRadarFrame(radarFrames.length - 1);

            } catch (err) {
                console.error("Radar error:", err);
                radarTimestamp.innerText = "Error";
            }
        }
        initRadar();
    </script>
</body>
</html>
