<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .leaflet-container { background: #111; }
        
        /* Lightning strike animation */
        .lightning-strike {
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fce803, 0 0 15px #fce803;
            transition: opacity 1.5s ease-out;
        }

        /* Time Slider UI */
        #timeline-ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(20, 20, 20, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
            width: 300px;
        }

        #timestamp {
            font-size: 14px;
            font-weight: bold;
            min-width: 75px;
        }

        #time-slider {
            flex-grow: 1;
            cursor: pointer;
            accent-color: #fce803;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="timeline-ui">
        <div id="timestamp">Loading...</div>
        <input type="range" id="time-slider" min="0" max="0" value="0" step="1" disabled>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { 
            zoomControl: false,
            attributionControl: false 
        }).setView([50.29, 18.66], 5);

        // Base Map
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let radarLayers = [];

        async function loadRadar() {
            try {
                const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await res.json();
                
                const slider = document.getElementById('time-slider');
                
                // Pre-load all available past radar frames
                data.radar.past.forEach((frame) => {
                    const layer = L.tileLayer(`https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`, {
                        opacity: 0, // Hidden by default
                        transparent: true,
                        maxNativeZoom: 7 // FIX: Prevents "Zoom unsupported" by stretching tiles when zooming in further
                    }).addTo(map);
                    
                    radarLayers.push({ layer, time: frame.time });
                });

                // Configure slider
                slider.max = radarLayers.length - 1;
                slider.value = radarLayers.length - 1;
                slider.disabled = false;

                function showFrame(index) {
                    // Hide all frames
                    radarLayers.forEach(r => r.layer.setOpacity(0));
                    // Show selected frame
                    radarLayers[index].layer.setOpacity(0.65);
                    
                    // Update timestamp display
                    const date = new Date(radarLayers[index].time * 1000);
                    document.getElementById('timestamp').innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                // Listen for slider movement
                slider.addEventListener('input', (e) => {
                    showFrame(e.target.value);
                });

                // Show the latest frame initially
                showFrame(radarLayers.length - 1);

            } catch (err) {
                console.error("Radar load failed:", err);
                document.getElementById('timestamp').innerText = "Radar Error";
            }
        }
        loadRadar();

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.port === '5500' ? 'localhost:3000' : window.location.host;
        const ws = new WebSocket(`${protocol}//${wsHost}`);
        
        ws.onmessage = (event) => {
            const strike = JSON.parse(event.data);
            
            const marker = L.divIcon({
                className: 'lightning-strike',
                iconSize: [6, 6]
            });
            
            const leafletMarker = L.marker([strike.lat, strike.lon], { icon: marker }).addTo(map);
            
            // Fading effect
            setTimeout(() => {
                leafletMarker.getElement().style.opacity = '0';
                setTimeout(() => map.removeLayer(leafletMarker), 1500);
            }, 100);
        };
    </script>
</body>
</html>
