<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weerweather</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-panel: #000000;
            --border-color: #3f3f46;
            --text-main: #ffffff;
            --text-mute: #a1a1aa;
            --control-bg: #18181b;
            --btn-bg: #18181b;
            --btn-hover: #27272a;
            --btn-active: #09090b;
        }

        :root.light-mode {
            --bg-panel: #ffffff;
            --border-color: #d4d4d8;
            --text-main: #09090b;
            --text-mute: #52525b;
            --control-bg: #f4f4f5;
            --btn-bg: #f4f4f5;
            --btn-hover: #e4e4e7;
            --btn-active: #d4d4d8;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-panel); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .leaflet-container { background: var(--bg-panel); }
        
        #logo {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1000;
            color: var(--text-main);
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            user-select: none;
            letter-spacing: 0.05em;
        }
        #logo .ghost { opacity: 0.15; }

        #control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 240px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            z-index: 1000;
            font-size: 11px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }

        #panel-tab {
            padding: 6px 12px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            color: var(--text-mute);
            user-select: none;
        }
        #panel-tab:hover { color: var(--text-main); }
        #control-panel.collapsed { width: auto; }
        .collapsed #panel-body { display: none; }
        .collapsed #panel-tab { border-bottom: none; text-align: center; }

        .panel-section { padding: 12px; border-bottom: 1px solid var(--border-color); }

        @media (max-width: 600px) {
            #unified-timeline-container { width: 95%; padding: 8px 12px; bottom: 12px; }
            #control-panel { width: 200px; right: 12px; top: 12px; }
        }
        .panel-section:last-child { border-bottom: none; }
        .section-header { color: var(--text-mute); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; font-size: 9px; letter-spacing: 0.05em; }
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .control-row:last-child { margin-bottom: 0; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 6px; }

        .switch { position: relative; display: inline-block; width: 32px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #27272a; transition: 0.1s; border-radius: 2px;
            border: 1px solid var(--border-color);
        }
        .slider:before {
            position: absolute; content: ""; height: 10px; width: 10px; left: 2px; bottom: 2px;
            background-color: var(--text-mute); transition: 0.1s; border-radius: 1px;
        }
        input:checked + .slider { background-color: var(--text-main); border-color: var(--text-main); }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--bg-panel); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: #27272a;
            outline: none;
            margin: 4px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 8px; height: 10px; background: var(--text-main); cursor: pointer; border-radius: 1px;
        }

        #unified-timeline-container {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 700px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: var(--text-main);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }
        .timeline-top { display: flex; justify-content: space-between; align-items: center; }
        .play-controls { display: flex; gap: 8px; align-items: center; }
        
        .btn {
            background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-main);
            padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; text-transform: uppercase;
        }
        .btn:hover { background: var(--btn-hover); }
        .btn:active { background: var(--btn-active); }
        .pixelated-layer { image-rendering: pixelated; }

        .timeline-wrapper { position: relative; width: 100%; margin: 6px 0 2px 0; display: flex; align-items: center; }
        #now-marker {
            position: absolute; top: -4px; bottom: -4px; width: 2px;
            background: #10b981; pointer-events: none; z-index: 5;
            box-shadow: 0 0 4px #10b981; display: none;
        }
    </style>
</head>
<body>
    <div id="logo"><span class="ghost">A</span>weerWeather</div>
    <div id="map"></div>

    <div id="control-panel">
        <div id="panel-tab">[ – ] HIDE</div>
        
        <div id="panel-body">
            <div class="panel-section">
                <div class="section-header">Overlays & Audio</div>
                <div class="control-row">
                    <span>Rain Radar</span>
                    <label class="switch">
                        <input type="checkbox" id="layer-radar" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Cloud Cover</span>
                    <label class="switch">
                        <input type="checkbox" id="layer-clouds">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Lightning Map</span>
                    <label class="switch">
                        <input type="checkbox" id="layer-lightning" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Storm Vectors</span>
                    <label class="switch">
                        <input type="checkbox" id="layer-vectors">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Audio Ticks</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-sound">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Light Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-theme">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-header">Lightning History</div>
                <div class="slider-label">
                    <span>Max Age</span>
                    <span id="lightning-age-val" style="font-weight: bold;">10m</span>
                </div>
                <input type="range" id="lightning-age-slider" min="1" max="180" value="10">
            </div>
            
            <div class="panel-section">
                <div class="section-header">Data Sources</div>
                <div style="color: var(--text-mute); line-height: 1.4; font-size: 9px;">
                    STRIKES: BLITZORTUNG.ORG<br>
                    RADAR: RAINVIEWER API<br>
                    MAP: © OPENSTREETMAP / CARTO
                </div>
            </div>
        </div>
    </div>

    <div id="unified-timeline-container">
        <div class="timeline-top">
            <div class="play-controls">
                <button id="uni-play-btn" class="btn" disabled>▶ Play</button>
                <button id="uni-speed-btn" class="btn" disabled>1x</button>
                <button id="uni-live-btn" class="btn" disabled>LIVE</button>
            </div>
            <div style="font-size: 14px; font-weight: bold; letter-spacing: 0.05em;" id="uni-timestamp">--:--</div>
            <div style="font-size: 11px; color: var(--text-mute);" id="uni-status">LIVE</div>
        </div>
        <div class="timeline-wrapper">
            <div id="now-marker"></div>
            <input type="range" id="uni-timeline" min="0" max="0" value="0" step="60" disabled>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([50.29, 18.66], 5);
        let baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const savedSettings = ['layer-radar', 'layer-clouds', 'layer-lightning', 'layer-vectors', 'toggle-sound', 'toggle-theme'];
        savedSettings.forEach(id => {
            const el = document.getElementById(id);
            const val = localStorage.getItem(id);
            if (val !== null) el.checked = val === 'true';
            el.addEventListener('change', () => localStorage.setItem(id, el.checked));
        });

        const savedAge = localStorage.getItem('lightning-age-slider');
        if (savedAge !== null) {
            document.getElementById('lightning-age-slider').value = savedAge;
            document.getElementById('lightning-age-val').innerText = `${savedAge}m`;
        }
        document.getElementById('lightning-age-slider').addEventListener('change', (e) => localStorage.setItem('lightning-age-slider', e.target.value));

        if (document.getElementById('toggle-theme').checked) {
            document.documentElement.classList.add('light-mode');
            baseLayer.setUrl('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
        }

        document.getElementById('toggle-theme').addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.classList.add('light-mode');
                baseLayer.setUrl('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
            } else {
                document.documentElement.classList.remove('light-mode');
                baseLayer.setUrl('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
            }
        });

        document.getElementById('panel-tab').addEventListener('click', (e) => {
            const panel = document.getElementById('control-panel');
            panel.classList.toggle('collapsed');
            e.target.innerText = panel.classList.contains('collapsed') ? '[ + ] SHOW' : '[ – ] HIDE';
        });

        // Audio Engine
        let audioCtx = null;
        let isSoundEnabled = document.getElementById('toggle-sound').checked;
        document.getElementById('toggle-sound').addEventListener('change', (e) => {
            isSoundEnabled = e.target.checked;
            if (isSoundEnabled && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isSoundEnabled && audioCtx.state === 'suspended') audioCtx.resume();
        });

        document.body.addEventListener('click', () => {
            if (isSoundEnabled && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && audioCtx && audioCtx.state === 'suspended' && isSoundEnabled) {
                audioCtx.resume();
            }
        });

        function playStrikeSound() {
            if (!isSoundEnabled) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Helper to convert radians to compass heading
        function getCompassHeading(radians) {
            let deg = radians * 180 / Math.PI;
            deg = (deg + 90 + 360) % 360; 
            const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return dirs[Math.round(deg / 22.5) % 16];
        }

        // Canvas Engine
        const LightningCanvasLayer = L.Layer.extend({
            initialize: function() {
                this.strikes = [];
                this.displayAgeMs = 10 * 60 * 1000;
            },
            onAdd: function(map) {
                this._map = map;
                this._canvas = L.DomUtil.create('canvas', 'leaflet-zoom-animated');
                this._canvas.style.pointerEvents = 'none';
                map.getPanes().overlayPane.appendChild(this._canvas);
                map.on('zoom move resize', this._update, this);
                this._update();
                
                this._animating = true;
                const loop = () => {
                    if (!this._animating) return;
                    this.redraw();
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            },
            onRemove: function(map) {
                this._animating = false;
                L.DomUtil.remove(this._canvas);
                map.off('zoom move resize', this._update, this);
            },
            _update: function() {
                if (!this._map) return;
                const size = this._map.getSize();
                this._canvas.width = size.x;
                this._canvas.height = size.y;
                L.DomUtil.setPosition(this._canvas, this._map.containerPointToLayerPoint([0, 0]));
            },
            redraw: function() {
                if (!this._map || !this._canvas) return;
                const ctx = this._canvas.getContext('2d');
                ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
                
                if (!document.getElementById('layer-lightning').checked) return;
                
                const timeVisual = (window.isLive && !window.isPlaying) ? Date.now() : (window.unifiedTimeMs || Date.now());
                if (window.isLive && !window.isPlaying) window.unifiedTimeMs = timeVisual;
                const bounds = this._map.getBounds();
                const south = bounds.getSouth();
                const north = bounds.getNorth();
                const west = bounds.getWest();
                const east = bounds.getEast();
                
                const showVectors = document.getElementById('layer-vectors').checked;
                const visiblePoints = [];
                const realNow = Date.now();
                
                // PASS 1: Draw Strikes
                const isLight = document.documentElement.classList.contains('light-mode');
                for (let i = 0; i < this.strikes.length; i++) {
                    const strike = this.strikes[i];
                    const ageVisual = timeVisual - strike.timestamp;
                    const ageReal = realNow - strike.timestamp;
                    
                    if (strike.lat < south || strike.lat > north || strike.lon < west || strike.lon > east) continue;
                    
                    const pt = this._map.latLngToContainerPoint([strike.lat, strike.lon]);
                    
                    if (ageReal >= 0 && ageReal <= this.displayAgeMs) {
                        visiblePoints.push({ x: pt.x, y: pt.y, lat: strike.lat, lon: strike.lon, age: ageReal, timestamp: strike.timestamp });
                    }

                    if (window.isFuture || ageVisual < 0 || ageVisual > this.displayAgeMs) continue;

                    const ratio = ageVisual / this.displayAgeMs;
                    
                    let r, g, b;
                    if (isLight) {
                        r = Math.round(255 * ratio);
                        g = 0;
                        b = 0;
                    } else {
                        r = 255;
                        g = Math.round(255 * (1 - ratio));
                        b = Math.round(255 * (1 - ratio));
                    }
                    
                    ctx.font = 'bold 12px ui-monospace, monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    ctx.fillText('×', pt.x, pt.y);

                    if (window.isLive && ageVisual < 600) {
                        const animProgress = ageVisual / 600;
                        const radius = 40 * (1 - animProgress);
                        const alpha = 1 - Math.pow(animProgress, 2);

                        ctx.beginPath();
                        ctx.strokeStyle = isLight ? `rgba(0, 0, 0, ${alpha})` : `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(pt.x - radius, pt.y - radius);
                        ctx.lineTo(pt.x + radius, pt.y + radius);
                        ctx.moveTo(pt.x + radius, pt.y - radius);
                        ctx.lineTo(pt.x - radius, pt.y + radius);
                        ctx.stroke();
                    }
                }

                // PASS 2: Draw Storm Vectors ON TOP
                if (visiblePoints.length > 0) {
                    const clusters = [];
                    // Anchor clustering geographically (~35-40km radius) so it survives zooming
                    const CLUSTER_DEG_SQ = 0.35 * 0.35; 
                    
                    visiblePoints.forEach(p => {
                        let found = false;
                        for (let c of clusters) {
                            const dLat = p.lat - c.clat;
                            // Approximate longitude scaling based on latitude to prevent distortion
                            const dLon = (p.lon - c.clon) * Math.cos(c.clat * Math.PI / 180);
                            if (dLat*dLat + dLon*dLon < CLUSTER_DEG_SQ) {
                                c.pts.push(p);
                                c.clat = (c.clat * (c.pts.length - 1) + p.lat) / c.pts.length;
                                c.clon = (c.clon * (c.pts.length - 1) + p.lon) / c.pts.length;
                                // Keep updating screen coordinates for rendering
                                c.cx = (c.cx * (c.pts.length - 1) + p.x) / c.pts.length;
                                c.cy = (c.cy * (c.pts.length - 1) + p.y) / c.pts.length;
                                found = true;
                                break;
                            }
                        }
                        if (!found) clusters.push({ cx: p.x, cy: p.y, clat: p.lat, clon: p.lon, pts: [p] });
                    });

                    clusters.forEach(c => {
                        // Strict filter: Ignore noise, require active core
                        if (c.pts.length < 20) return; 

                        // Find circle radius
                        let maxRadiusSq = 0;
                        c.pts.forEach(p => {
                            const dSq = (p.x - c.cx)**2 + (p.y - c.cy)**2;
                            if (dSq > maxRadiusSq) maxRadiusSq = dSq;
                        });
                        const radius = Math.sqrt(maxRadiusSq) + 15;

                        // Calculate Speed & Direction
                        c.pts.sort((a, b) => b.age - a.age); 
                        const half = Math.floor(c.pts.length / 2);
                        const olderHalf = c.pts.slice(0, half);
                        const newerHalf = c.pts.slice(half);

                        if (olderHalf.length > 0 && newerHalf.length > 0) {
                            const ox = olderHalf.reduce((sum, p) => sum + p.x, 0) / olderHalf.length;
                            const oy = olderHalf.reduce((sum, p) => sum + p.y, 0) / olderHalf.length;
                            const ot = olderHalf.reduce((sum, p) => sum + p.timestamp, 0) / olderHalf.length;

                            const nx = newerHalf.reduce((sum, p) => sum + p.x, 0) / newerHalf.length;
                            const ny = newerHalf.reduce((sum, p) => sum + p.y, 0) / newerHalf.length;
                            const nt = newerHalf.reduce((sum, p) => sum + p.timestamp, 0) / newerHalf.length;

                            // Real-world map distance math
                            const latlngO = this._map.containerPointToLatLng([ox, oy]);
                            const latlngN = this._map.containerPointToLatLng([nx, ny]);
                            const distanceMeters = latlngO.distanceTo(latlngN);
                            const timeDiffSec = (nt - ot) / 1000;
                            const speedMPS = timeDiffSec > 0 ? (distanceMeters / timeDiffSec) : 0;
                            
                            const dx = nx - ox;
                            const dy = ny - oy;
                            const pixelDist = Math.sqrt(dx*dx + dy*dy);
                            
                            // Strict real-world filter: Only draw if distinct movement (>2km) and realistic speed (2 to 50 m/s)
                            if (distanceMeters > 2000 && speedMPS > 2 && speedMPS < 50) {
                                const angle = Math.atan2(dy, dx);
                                const heading = getCompassHeading(angle);
                                const label = `${heading} @ ${speedMPS.toFixed(1)} m/s`;
                                
                                c.latPerSec = (latlngN.lat - latlngO.lat) / timeDiffSec;
                                c.lngPerSec = (latlngN.lng - latlngO.lng) / timeDiffSec;

                                if (window.isFuture || !showVectors) return;

                                // Draw Bounding Circle
                                ctx.beginPath();
                                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                                ctx.lineWidth = 1;
                                ctx.arc(c.cx, c.cy, radius, 0, Math.PI * 2);
                                ctx.stroke();

                                const drawArrow = (color, width) => {
                                    ctx.beginPath();
                                    ctx.strokeStyle = color;
                                    ctx.lineWidth = width;
                                    const arrowLen = Math.max(40, pixelDist * 2); 
                                    const endX = c.cx + Math.cos(angle) * arrowLen;
                                    const endY = c.cy + Math.sin(angle) * arrowLen;
                                    
                                    ctx.moveTo(c.cx, c.cy);
                                    ctx.lineTo(endX, endY);
                                    
                                    const headLen = 10;
                                    ctx.lineTo(endX - headLen * Math.cos(angle - Math.PI/6), endY - headLen * Math.sin(angle - Math.PI/6));
                                    ctx.moveTo(endX, endY);
                                    ctx.lineTo(endX - headLen * Math.cos(angle + Math.PI/6), endY - headLen * Math.sin(angle + Math.PI/6));
                                    ctx.stroke();
                                };

                                // Draw Outline, then Fill
                                drawArrow('rgba(0,0,0,0.8)', 5);
                                drawArrow('#ffd700', 2);

                                // Draw Label with Shadow
                                ctx.font = 'bold 11px ui-monospace, monospace';
                                ctx.textAlign = 'left';
                                ctx.textBaseline = 'middle';
                                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                                ctx.fillText(label, c.cx + radius + 6, c.cy + 1);
                                ctx.fillText(label, c.cx + radius + 4, c.cy - 1);
                                ctx.fillStyle = '#ffd700';
                                ctx.fillText(label, c.cx + radius + 5, c.cy);
                            }
                        }
                    });

                    const validClusters = clusters.filter(c => c.latPerSec !== undefined);
                    if (validClusters.length > 0) {
                        window.stormMotion = {
                            latPerSec: validClusters.reduce((sum, c) => sum + c.latPerSec, 0) / validClusters.length,
                            lngPerSec: validClusters.reduce((sum, c) => sum + c.lngPerSec, 0) / validClusters.length
                        };
                    }
                }
            }
        });

        const lightningLayer = new LightningCanvasLayer().addTo(map);
        if (savedAge !== null) {
            lightningLayer.displayAgeMs = parseInt(savedAge) * 60 * 1000;
        }

        setInterval(() => {
            const now = Date.now();
            lightningLayer.strikes = lightningLayer.strikes.filter(s => (now - s.timestamp) <= (6 * 60 * 60 * 1000));
        }, 5000);

        const lightningAgeSlider = document.getElementById('lightning-age-slider');
        const lightningAgeVal = document.getElementById('lightning-age-val');
        lightningAgeSlider.addEventListener('input', (e) => {
            lightningAgeVal.innerText = `${e.target.value}m`;
            lightningLayer.displayAgeMs = parseInt(e.target.value) * 60 * 1000;
        });

        // Client-Side Optical Flow Block-Matching Advection Engine
        const OpticalFlowLayer = L.GridLayer.extend({
            createTile: function(coords, done) {
                const canvas = L.DomUtil.create('canvas', 'leaflet-tile');
                const size = this.getTileSize();
                canvas.width = size.x;
                canvas.height = size.y;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });

                const { pathT, pathT1, progress } = this.options;
                if (!pathT || !pathT1 || progress <= 0) {
                    setTimeout(() => done(null, canvas), 0);
                    return canvas;
                }

                const urlT = `/api/radar/tile${pathT}/512/${coords.z}/${coords.x}/${coords.y}/2/1_1.png`;
                const urlT1 = `/api/radar/tile${pathT1}/512/${coords.z}/${coords.x}/${coords.y}/2/1_1.png`;

                let imgT = new Image(); let imgT1 = new Image();
                let loaded = 0;

                const onload = () => {
                    loaded++;
                    if (loaded === 2) {
                        try {
                            const cT = document.createElement('canvas'); const cT1 = document.createElement('canvas');
                            cT.width = cT1.width = size.x; cT.height = cT1.height = size.y;
                            const ctxT = cT.getContext('2d', { willReadFrequently: true });
                            const ctxT1 = cT1.getContext('2d', { willReadFrequently: true });
                            ctxT.drawImage(imgT, 0, 0); ctxT1.drawImage(imgT1, 0, 0);
                            
                            const dataT = ctxT.getImageData(0, 0, size.x, size.y);
                            const dataT1 = ctxT1.getImageData(0, 0, size.x, size.y);
                            const outData = ctx.createImageData(size.x, size.y);
                            
                            const blockSize = 32; const searchRange = 16; const vectors = {}; 
                            
                            const getVal = (data, x, y) => {
                                if (x < 0 || y < 0 || x >= size.x || y >= size.y) return 0;
                                const i = (y * size.x + x) * 4;
                                return data[i+3] > 0 ? data[i] + data[i+1] + data[i+2] : 0; 
                            };

                            for (let by = 0; by < size.y; by += blockSize) {
                                for (let bx = 0; bx < size.x; bx += blockSize) {
                                    let bestSAD = Infinity; let bestU = 0, bestV = 0;
                                    let hasData = false;
                                    for(let py = 0; py < blockSize; py += 8) {
                                        for(let px = 0; px < blockSize; px += 8) {
                                            if (getVal(dataT.data, bx + px, by + py) > 0) hasData = true;
                                        }
                                    }

                                    if (hasData) {
                                        for (let v = -searchRange; v <= searchRange; v += 2) {
                                            for (let u = -searchRange; u <= searchRange; u += 2) {
                                                let sad = 0;
                                                for (let y = 0; y < blockSize; y += 4) {
                                                    for (let x = 0; x < blockSize; x += 4) {
                                                        sad += Math.abs(getVal(dataT.data, bx + x, by + y) - getVal(dataT1.data, bx + x + u, by + y + v));
                                                    }
                                                }
                                                if (sad < bestSAD) { bestSAD = sad; bestU = u; bestV = v; }
                                            }
                                        }
                                    }
                                    vectors[`${bx},${by}`] = { u: bestU, v: bestV };
                                }
                            }

                            for (let y = 0; y < size.y; y++) {
                                for (let x = 0; x < size.x; x++) {
                                    const bx = Math.floor(x / blockSize) * blockSize;
                                    const by = Math.floor(y / blockSize) * blockSize;
                                    const vec = vectors[`${bx},${by}`] || { u: 0, v: 0 };
                                    
                                    const srcX = Math.round(x + vec.u * progress);
                                    const srcY = Math.round(y + vec.v * progress);
                                    
                                    if (srcX >= 0 && srcX < size.x && srcY >= 0 && srcY < size.y) {
                                        const dstIdx = (y * size.x + x) * 4;
                                        const srcIdx = (srcY * size.x + srcX) * 4;
                                        outData.data[dstIdx] = dataT.data[srcIdx];
                                        outData.data[dstIdx+1] = dataT.data[srcIdx+1];
                                        outData.data[dstIdx+2] = dataT.data[srcIdx+2];
                                        outData.data[dstIdx+3] = dataT.data[srcIdx+3];
                                    }
                                }
                            }
                            ctx.putImageData(outData, 0, 0);
                            done(null, canvas);
                        } catch (e) { done(e, canvas); }
                    }
                };

                imgT.onload = onload; imgT1.onload = onload;
                imgT.onerror = () => done(null, canvas); imgT1.onerror = () => done(null, canvas);
                imgT.src = urlT; imgT1.src = urlT1;
                return canvas;
            }
        });

        // Websocket
        window.isLive = true;
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.port === '5500' ? 'localhost:3000' : window.location.host;
        
        let ws;
        function connectWebSocket() {
            ws = new WebSocket(`${protocol}//${wsHost}`);

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'history') {
                    lightningLayer.strikes = msg.data;
                } else if (msg.type === 'strike') {
                    lightningLayer.strikes.push({ lat: msg.lat, lon: msg.lon, timestamp: Date.now() });
                    const bounds = map.getBounds();
                    if (window.isLive && bounds.contains([msg.lat, msg.lon])) playStrikeSound();
                }
            };

            ws.onclose = () => {
                setTimeout(connectWebSocket, 3000);
            };
        }
        connectWebSocket();

        // Radar & Unified Timeline Engine
        window.unifiedTimeMs = Date.now();
        window.isPlaying = false;
        
        const radarLayers = {};
        const cloudLayers = {};
        let currentFramePath = null;
        let currentCloudFramePath = null;
        const uniTimeline = document.getElementById('uni-timeline');
        const uniTimestamp = document.getElementById('uni-timestamp');
        const uniStatus = document.getElementById('uni-status');
        const playBtn = document.getElementById('uni-play-btn');
        const speedBtn = document.getElementById('uni-speed-btn');
        const liveBtn = document.getElementById('uni-live-btn');
        const nowMarker = document.getElementById('now-marker');
        const layerRadarCheckbox = document.getElementById('layer-radar');
        const layerCloudsCheckbox = document.getElementById('layer-clouds');

        let radarFrames = [];
        let cloudFrames = [];
        let playInterval = null;
        let currentSpeedIdx = 0;
        
        const speeds = [
            { label: '1x', tickMs: 100, stepSec: 60 },
            { label: '2x', tickMs: 50, stepSec: 60 },
            { label: '0.5x', tickMs: 200, stepSec: 60 }
        ];

        function updateMarker() {
            const min = parseInt(uniTimeline.min);
            const max = parseInt(uniTimeline.max);
            if (max <= min) return;
            const nowSec = Math.floor(Date.now() / 1000);
            let pct = (nowSec - min) / (max - min);
            if (pct >= 0 && pct <= 1) {
                nowMarker.style.display = 'block';
                nowMarker.style.left = `calc(${pct * 100}% - 1px)`;
            } else {
                nowMarker.style.display = 'none';
            }
        }

        function syncTimelineState() {
            const val = parseInt(uniTimeline.value);
            const nowSec = Math.floor(Date.now() / 1000);
            
            window.isLive = Math.abs(val - nowSec) <= 60;
            window.isFuture = val > nowSec + 60;

            if (window.isLive && !window.isPlaying) {
                window.unifiedTimeMs = Date.now();
                uniStatus.innerText = 'LIVE';
                uniStatus.style.color = '#10b981';
            } else if (window.isFuture) {
                window.unifiedTimeMs = val * 1000;
                const minsFuture = Math.floor((val - nowSec) / 60);
                uniStatus.innerText = `+${minsFuture} MIN (FORECAST)`;
                uniStatus.style.color = '#f59e0b';
            } else {
                window.unifiedTimeMs = val * 1000;
                const minsAgo = Math.floor((nowSec - val) / 60);
                uniStatus.innerText = `-${minsAgo} MIN`;
                uniStatus.style.color = 'var(--text-mute)';
            }

            const date = new Date(window.unifiedTimeMs);
            uniTimestamp.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

            updateMarker();
            updateRadarVisuals();
        }

        function updateRadarVisuals() {
            if (radarFrames.length > 0) {
                let activeFrame = radarFrames[0];
                let previousFrame = radarFrames[0];
                let isPrediction = false;
                let predictionProgress = 0;

                for (let i = 0; i < radarFrames.length; i++) {
                    if (radarFrames[i].time <= window.unifiedTimeMs / 1000) {
                        previousFrame = activeFrame;
                        activeFrame = radarFrames[i];
                    } else break;
                }

                if (window.unifiedTimeMs / 1000 > radarFrames[radarFrames.length - 1].time) {
                    isPrediction = true;
                    if (radarFrames.length >= 2) {
                        previousFrame = radarFrames[radarFrames.length - 2];
                    }
                    activeFrame = radarFrames[radarFrames.length - 1];
                    const gap = Math.max(600, activeFrame.time - previousFrame.time); 
                    predictionProgress = (window.unifiedTimeMs / 1000 - activeFrame.time) / gap;
                }

                const layerKey = isPrediction ? `predict_${activeFrame.path}_${predictionProgress.toFixed(2)}` : activeFrame.path;

                if (!radarLayers[layerKey]) {
                    if (isPrediction && previousFrame.path !== activeFrame.path) {
                        radarLayers[layerKey] = new OpticalFlowLayer({
                            pathT: activeFrame.path,
                            pathT1: previousFrame.path,
                            progress: predictionProgress,
                            opacity: 0,
                            className: 'pixelated-layer',
                            zIndex: 10
                        }).addTo(map);
                    } else {
                        const url = `/api/radar/tile${activeFrame.path}/512/{z}/{x}/{y}/2/1_1.png`;
                        radarLayers[layerKey] = L.tileLayer(url, { opacity: 0, maxNativeZoom: 3, transparent: true, className: 'pixelated-layer', zIndex: 10 }).addTo(map);
                    }
                }

                if (currentFramePath && currentFramePath !== layerKey && radarLayers[currentFramePath]) {
                    radarLayers[currentFramePath].setOpacity(0);
                }

                currentFramePath = layerKey;
                
                if (layerRadarCheckbox.checked) {
                    radarLayers[layerKey].setOpacity(0.65);
                }
            }

            if (cloudFrames.length > 0) {
                let activeCloud = cloudFrames[0];
                
                if (window.isFuture) {
                    activeCloud = cloudFrames[cloudFrames.length - 1];
                } else {
                    for (let i = 0; i < cloudFrames.length; i++) {
                        if (cloudFrames[i].time <= window.unifiedTimeMs / 1000) {
                            activeCloud = cloudFrames[i];
                        } else break;
                    }
                }

                if (!cloudLayers[activeCloud.path]) {
                    const url = `/api/radar/tile${activeCloud.path}/256/{z}/{x}/{y}/0/0_0.png`;
                    cloudLayers[activeCloud.path] = L.tileLayer(url, { opacity: 0, maxNativeZoom: 3, transparent: true, className: 'pixelated-layer', zIndex: 5 }).addTo(map);
                }

                if (currentCloudFramePath && currentCloudFramePath !== activeCloud.path && cloudLayers[currentCloudFramePath]) {
                    cloudLayers[currentCloudFramePath].setOpacity(0);
                }

                currentCloudFramePath = activeCloud.path;
                
                if (layerCloudsCheckbox.checked) {
                    cloudLayers[activeCloud.path].setOpacity(0.4);
                }
            }
        }

        async function fetchRadarData() {
            try {
                const res = await fetch('/api/radar/metadata');
                const data = await res.json();
                const newFrames = data.radar.past;
                const newClouds = data.satellite && data.satellite.infrared ? data.satellite.infrared : [];

                if (radarFrames.length === 0) {
                    radarFrames = newFrames;
                    cloudFrames = newClouds;
                    
                    const minTime = radarFrames[0].time;
                    const maxTime = radarFrames[radarFrames.length - 1].time + 7200;
                    
                    uniTimeline.min = minTime;
                    uniTimeline.max = maxTime;
                    uniTimeline.value = Math.floor(Date.now() / 1000);
                    uniTimeline.disabled = false;
                    playBtn.disabled = false;
                    speedBtn.disabled = false;
                    liveBtn.disabled = false;
                    
                    syncTimelineState();
                } else if (newFrames[newFrames.length - 1].time > radarFrames[radarFrames.length - 1].time) {
                    const wasLive = window.isLive;
                    radarFrames = newFrames;
                    cloudFrames = newClouds;
                    uniTimeline.max = radarFrames[radarFrames.length - 1].time + 7200;
                    
                    const activePaths = radarFrames.map(f => f.path);
                    for (const key in radarLayers) {
                        const basePath = key.startsWith('predict_') ? key.split('_')[1] : key;
                        if (!activePaths.includes(basePath)) {
                            map.removeLayer(radarLayers[key]);
                            delete radarLayers[key];
                        }
                    }

                    const activeCloudPaths = cloudFrames.map(f => f.path);
                    for (const path in cloudLayers) {
                        if (!activeCloudPaths.includes(path)) {
                            map.removeLayer(cloudLayers[path]);
                            delete cloudLayers[path];
                        }
                    }

                    if (wasLive) {
                        uniTimeline.value = nowSec;
                        syncTimelineState();
                    }
                }
            } catch (err) {
                console.error("Radar sync error:", err);
            }
        }
        
        fetchRadarData();
        setInterval(() => {
            if (radarFrames.length > 0) {
                const nowSec = Math.floor(Date.now() / 1000);
                uniTimeline.max = nowSec + 3600;
                if (window.isLive && !window.isPlaying) {
                    uniTimeline.value = nowSec;
                    window.unifiedTimeMs = Date.now();
                    const date = new Date(window.unifiedTimeMs);
                    uniTimestamp.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                }
            }
        }, 1000);
        setInterval(fetchRadarData, 120000);

        map.on('zoom move', () => {
            if (window.isFuture) updateRadarVisuals();
        });

        uniTimeline.addEventListener('input', () => {
            if (window.isPlaying) stopLoop();
            syncTimelineState();
        });

        layerRadarCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                updateRadarVisuals();
            } else {
                if (currentFramePath && radarLayers[currentFramePath]) {
                    radarLayers[currentFramePath].setOpacity(0);
                }
            }
        });

        layerCloudsCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                updateRadarVisuals();
            } else {
                if (currentCloudFramePath && cloudLayers[currentCloudFramePath]) {
                    cloudLayers[currentCloudFramePath].setOpacity(0);
                }
            }
        });

        function runLoop() {
            if (playInterval) clearInterval(playInterval);
            window.isPlaying = true;
            playBtn.innerText = '❚❚ Pause';
            
            const speed = speeds[currentSpeedIdx];
            playInterval = setInterval(() => {
                let next = parseInt(uniTimeline.value) + speed.stepSec;
                if (next > parseInt(uniTimeline.max)) {
                    next = parseInt(uniTimeline.min);
                }
                uniTimeline.value = next;
                syncTimelineState();
            }, speed.tickMs);
        }

        function stopLoop() {
            window.isPlaying = false;
            playBtn.innerText = '▶ Play';
            clearInterval(playInterval);
            syncTimelineState();
        }

        playBtn.addEventListener('click', () => window.isPlaying ? stopLoop() : runLoop());
        
        speedBtn.addEventListener('click', () => {
            currentSpeedIdx = (currentSpeedIdx + 1) % speeds.length;
            speedBtn.innerText = speeds[currentSpeedIdx].label;
            if (window.isPlaying) runLoop(); 
        });

        liveBtn.addEventListener('click', () => {
            if (window.isPlaying) stopLoop();
            uniTimeline.value = Math.floor(Date.now() / 1000);
            syncTimelineState();
        });

        setInterval(() => {
            if (radarFrames.length > 0) updateMarker();
        }, 10000);
    </script>
</body>
</html>
