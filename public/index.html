<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weerweather</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-panel: #121214;
            --border-color: #27272a;
            --text-main: #f4f4f5;
            --text-mute: #71717a;
            --control-bg: #1e1e2f;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #09090b; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .leaflet-container { background: #09090b; }
        
        #logo {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1000;
            color: var(--text-main);
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            user-select: none;
            letter-spacing: 0.05em;
        }
        #logo .ghost { opacity: 0.15; }

        #control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 240px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            z-index: 1000;
            font-size: 11px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }

        #panel-tab {
            padding: 6px 12px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            color: var(--text-mute);
            user-select: none;
        }
        #panel-tab:hover { color: var(--text-main); }
        .collapsed #panel-body { display: none; }
        .collapsed #panel-tab { border-bottom: none; }

        .panel-section { padding: 12px; border-bottom: 1px solid var(--border-color); }
        .panel-section:last-child { border-bottom: none; }
        .section-header { color: var(--text-mute); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; font-size: 9px; letter-spacing: 0.05em; }
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .control-row:last-child { margin-bottom: 0; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 6px; }

        .switch { position: relative; display: inline-block; width: 32px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #27272a; transition: 0.1s; border-radius: 2px;
            border: 1px solid var(--border-color);
        }
        .slider:before {
            position: absolute; content: ""; height: 10px; width: 10px; left: 2px; bottom: 2px;
            background-color: var(--text-mute); transition: 0.1s; border-radius: 1px;
        }
        input:checked + .slider { background-color: var(--text-main); border-color: var(--text-main); }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--bg-panel); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: #27272a;
            outline: none;
            margin: 8px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 8px; height: 10px; background: var(--text-main); cursor: pointer; border-radius: 1px;
        }

        #unified-timeline-container {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 700px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }
        .timeline-top { display: flex; justify-content: space-between; align-items: center; }
        .play-controls { display: flex; gap: 8px; align-items: center; }
        
        .btn {
            background: #18181b; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; text-transform: uppercase;
        }
        .btn:hover { background: #27272a; }
        .btn:active { background: #09090b; }
        .pixelated-layer { image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="logo"><span class="ghost">A</span>weerWeather</div>
    <div id="map"></div>

    <div id="control-panel">
        <div id="panel-tab">[ – ] HIDE</div>
        
        <div id="panel-body">
            <div class="panel-section">
                <div class="section-header">Overlays & Audio</div>
                <div class="control-row">
                    <span>Rain Radar</span>
                    <label class="switch">
                        <input type="checkbox" id="layer-radar" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Cloud Cover</span>
                    <label class="switch">
                        <input type="checkbox" id="layer-clouds">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Lightning Map</span>
                    <label class="switch">
                        <input type="checkbox" id="layer-lightning" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Storm Vectors</span>
                    <label class="switch">
                        <input type="checkbox" id="layer-vectors">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-row">
                    <span>Audio Ticks</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-sound">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-header">Lightning History</div>
                <div class="slider-label">
                    <span>Max Age</span>
                    <span id="lightning-age-val" style="font-weight: bold;">10m</span>
                </div>
                <input type="range" id="lightning-age-slider" min="1" max="180" value="10">
            </div>
            
            <div class="panel-section">
                <div class="section-header">Data Sources</div>
                <div style="color: var(--text-mute); line-height: 1.4; font-size: 9px;">
                    STRIKES: BLITZORTUNG.ORG<br>
                    RADAR: RAINVIEWER API<br>
                    MAP: © OPENSTREETMAP / CARTO
                </div>
            </div>
        </div>
    </div>

    <div id="unified-timeline-container">
        <div class="timeline-top">
            <div class="play-controls">
                <button id="uni-play-btn" class="btn" disabled>▶ Play</button>
                <button id="uni-speed-btn" class="btn" disabled>1x</button>
            </div>
            <div style="font-size: 14px; font-weight: bold; letter-spacing: 0.05em;" id="uni-timestamp">--:--</div>
            <div style="font-size: 11px; color: var(--text-mute);" id="uni-status">LIVE</div>
        </div>
        <input type="range" id="uni-timeline" min="0" max="0" value="0" step="60" disabled>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([50.29, 18.66], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        document.getElementById('panel-tab').addEventListener('click', (e) => {
            const panel = document.getElementById('control-panel');
            panel.classList.toggle('collapsed');
            e.target.innerText = panel.classList.contains('collapsed') ? '[ + ] SHOW' : '[ – ] HIDE';
        });

        // Audio Engine
        let audioCtx = null;
        let isSoundEnabled = false;
        document.getElementById('toggle-sound').addEventListener('change', (e) => {
            isSoundEnabled = e.target.checked;
            if (isSoundEnabled && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isSoundEnabled && audioCtx.state === 'suspended') audioCtx.resume();
        });

        function playStrikeSound() {
            if (!isSoundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Helper to convert radians to compass heading
        function getCompassHeading(radians) {
            let deg = radians * 180 / Math.PI;
            deg = (deg + 90 + 360) % 360; 
            const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return dirs[Math.round(deg / 22.5) % 16];
        }

        // Canvas Engine
        const LightningCanvasLayer = L.Layer.extend({
            initialize: function() {
                this.strikes = [];
                this.displayAgeMs = 10 * 60 * 1000;
            },
            onAdd: function(map) {
                this._map = map;
                this._canvas = L.DomUtil.create('canvas', 'leaflet-zoom-animated');
                this._canvas.style.pointerEvents = 'none';
                map.getPanes().overlayPane.appendChild(this._canvas);
                map.on('zoom move resize', this._update, this);
                this._update();
                
                this._animating = true;
                const loop = () => {
                    if (!this._animating) return;
                    this.redraw();
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            },
            onRemove: function(map) {
                this._animating = false;
                L.DomUtil.remove(this._canvas);
                map.off('zoom move resize', this._update, this);
            },
            _update: function() {
                if (!this._map) return;
                const size = this._map.getSize();
                this._canvas.width = size.x;
                this._canvas.height = size.y;
                L.DomUtil.setPosition(this._canvas, this._map.containerPointToLayerPoint([0, 0]));
            },
            redraw: function() {
                if (!this._map || !this._canvas) return;
                const ctx = this._canvas.getContext('2d');
                ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
                
                if (!document.getElementById('layer-lightning').checked) return;
                
                const now = (window.isLive && !window.isPlaying) ? Date.now() : (window.unifiedTimeMs || Date.now());
                if (window.isLive && !window.isPlaying) window.unifiedTimeMs = now;
                const bounds = this._map.getBounds();
                const south = bounds.getSouth();
                const north = bounds.getNorth();
                const west = bounds.getWest();
                const east = bounds.getEast();
                
                const showVectors = document.getElementById('layer-vectors').checked;
                const visiblePoints = [];
                
                // PASS 1: Draw Strikes
                for (let i = 0; i < this.strikes.length; i++) {
                    const strike = this.strikes[i];
                    const age = now - strike.timestamp;
                    
                    if (age < 0 || age > this.displayAgeMs) continue;
                    if (strike.lat < south || strike.lat > north || strike.lon < west || strike.lon > east) continue;
                    
                    const pt = this._map.latLngToContainerPoint([strike.lat, strike.lon]);
                    
                    if (showVectors) visiblePoints.push({ x: pt.x, y: pt.y, lat: strike.lat, lon: strike.lon, age: age, timestamp: strike.timestamp });

                    const ratio = age / this.displayAgeMs;
                    const g = Math.round(255 * (1 - ratio));
                    const b = Math.round(255 * (1 - ratio));
                    
                    ctx.font = 'bold 12px ui-monospace, monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = `rgb(255, ${g}, ${b})`;
                    ctx.fillText('×', pt.x, pt.y);

                    if (window.isLive && age < 600) {
                        const animProgress = age / 600;
                        const radius = 40 * (1 - animProgress);
                        const alpha = 1 - Math.pow(animProgress, 2);

                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(pt.x - radius, pt.y - radius);
                        ctx.lineTo(pt.x + radius, pt.y + radius);
                        ctx.moveTo(pt.x + radius, pt.y - radius);
                        ctx.lineTo(pt.x - radius, pt.y + radius);
                        ctx.stroke();
                    }
                }

                // PASS 2: Draw Storm Vectors ON TOP
                if (showVectors && visiblePoints.length > 0) {
                    const clusters = [];
                    // Anchor clustering geographically (~35-40km radius) so it survives zooming
                    const CLUSTER_DEG_SQ = 0.35 * 0.35; 
                    
                    visiblePoints.forEach(p => {
                        let found = false;
                        for (let c of clusters) {
                            const dLat = p.lat - c.clat;
                            // Approximate longitude scaling based on latitude to prevent distortion
                            const dLon = (p.lon - c.clon) * Math.cos(c.clat * Math.PI / 180);
                            if (dLat*dLat + dLon*dLon < CLUSTER_DEG_SQ) {
                                c.pts.push(p);
                                c.clat = (c.clat * (c.pts.length - 1) + p.lat) / c.pts.length;
                                c.clon = (c.clon * (c.pts.length - 1) + p.lon) / c.pts.length;
                                // Keep updating screen coordinates for rendering
                                c.cx = (c.cx * (c.pts.length - 1) + p.x) / c.pts.length;
                                c.cy = (c.cy * (c.pts.length - 1) + p.y) / c.pts.length;
                                found = true;
                                break;
                            }
                        }
                        if (!found) clusters.push({ cx: p.x, cy: p.y, clat: p.lat, clon: p.lon, pts: [p] });
                    });

                    clusters.forEach(c => {
                        // Strict filter: Ignore noise, require active core
                        if (c.pts.length < 20) return; 

                        // Find circle radius
                        let maxRadiusSq = 0;
                        c.pts.forEach(p => {
                            const dSq = (p.x - c.cx)**2 + (p.y - c.cy)**2;
                            if (dSq > maxRadiusSq) maxRadiusSq = dSq;
                        });
                        const radius = Math.sqrt(maxRadiusSq) + 15;

                        // Calculate Speed & Direction
                        c.pts.sort((a, b) => b.age - a.age); 
                        const half = Math.floor(c.pts.length / 2);
                        const olderHalf = c.pts.slice(0, half);
                        const newerHalf = c.pts.slice(half);

                        if (olderHalf.length > 0 && newerHalf.length > 0) {
                            const ox = olderHalf.reduce((sum, p) => sum + p.x, 0) / olderHalf.length;
                            const oy = olderHalf.reduce((sum, p) => sum + p.y, 0) / olderHalf.length;
                            const ot = olderHalf.reduce((sum, p) => sum + p.timestamp, 0) / olderHalf.length;

                            const nx = newerHalf.reduce((sum, p) => sum + p.x, 0) / newerHalf.length;
                            const ny = newerHalf.reduce((sum, p) => sum + p.y, 0) / newerHalf.length;
                            const nt = newerHalf.reduce((sum, p) => sum + p.timestamp, 0) / newerHalf.length;

                            // Real-world map distance math
                            const latlngO = this._map.containerPointToLatLng([ox, oy]);
                            const latlngN = this._map.containerPointToLatLng([nx, ny]);
                            const distanceMeters = latlngO.distanceTo(latlngN);
                            const timeDiffSec = (nt - ot) / 1000;
                            const speedMPS = timeDiffSec > 0 ? (distanceMeters / timeDiffSec) : 0;
                            
                            const dx = nx - ox;
                            const dy = ny - oy;
                            const pixelDist = Math.sqrt(dx*dx + dy*dy);
                            
                            // Strict real-world filter: Only draw if distinct movement (>2km) and realistic speed (2 to 50 m/s)
                            if (distanceMeters > 2000 && speedMPS > 2 && speedMPS < 50) {
                                const angle = Math.atan2(dy, dx);
                                const heading = getCompassHeading(angle);
                                const label = `${heading} @ ${speedMPS.toFixed(1)} m/s`;

                                // Draw Bounding Circle
                                ctx.beginPath();
                                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                                ctx.lineWidth = 1;
                                ctx.arc(c.cx, c.cy, radius, 0, Math.PI * 2);
                                ctx.stroke();

                                const drawArrow = (color, width) => {
                                    ctx.beginPath();
                                    ctx.strokeStyle = color;
                                    ctx.lineWidth = width;
                                    const arrowLen = Math.max(40, pixelDist * 2); 
                                    const endX = c.cx + Math.cos(angle) * arrowLen;
                                    const endY = c.cy + Math.sin(angle) * arrowLen;
                                    
                                    ctx.moveTo(c.cx, c.cy);
                                    ctx.lineTo(endX, endY);
                                    
                                    const headLen = 10;
                                    ctx.lineTo(endX - headLen * Math.cos(angle - Math.PI/6), endY - headLen * Math.sin(angle - Math.PI/6));
                                    ctx.moveTo(endX, endY);
                                    ctx.lineTo(endX - headLen * Math.cos(angle + Math.PI/6), endY - headLen * Math.sin(angle + Math.PI/6));
                                    ctx.stroke();
                                };

                                // Draw Outline, then Fill
                                drawArrow('rgba(0,0,0,0.8)', 5);
                                drawArrow('#ffd700', 2);

                                // Draw Label with Shadow
                                ctx.font = 'bold 11px ui-monospace, monospace';
                                ctx.textAlign = 'left';
                                ctx.textBaseline = 'middle';
                                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                                ctx.fillText(label, c.cx + radius + 6, c.cy + 1);
                                ctx.fillText(label, c.cx + radius + 4, c.cy - 1);
                                ctx.fillStyle = '#ffd700';
                                ctx.fillText(label, c.cx + radius + 5, c.cy);
                            }
                        }
                    });
                }
            }
        });

        const lightningLayer = new LightningCanvasLayer().addTo(map);

        setInterval(() => {
            const now = Date.now();
            lightningLayer.strikes = lightningLayer.strikes.filter(s => (now - s.timestamp) <= (6 * 60 * 60 * 1000));
        }, 5000);

        const lightningAgeSlider = document.getElementById('lightning-age-slider');
        const lightningAgeVal = document.getElementById('lightning-age-val');
        lightningAgeSlider.addEventListener('input', (e) => {
            lightningAgeVal.innerText = `${e.target.value}m`;
            lightningLayer.displayAgeMs = parseInt(e.target.value) * 60 * 1000;
        });

        // Websocket
        window.isLive = true;
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.port === '5500' ? 'localhost:3000' : window.location.host;
        const ws = new WebSocket(`${protocol}//${wsHost}`);

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'history') {
                lightningLayer.strikes = msg.data;
            } else if (msg.type === 'strike') {
                lightningLayer.strikes.push({ lat: msg.lat, lon: msg.lon, timestamp: Date.now() });
                const bounds = map.getBounds();
                if (window.isLive && bounds.contains([msg.lat, msg.lon])) playStrikeSound();
            }
        };

        // Radar & Unified Timeline Engine
        window.unifiedTimeMs = Date.now();
        window.isPlaying = false;
        
        const radarLayers = {};
        const cloudLayers = {};
        let currentFramePath = null;
        let currentCloudFramePath = null;
        const uniTimeline = document.getElementById('uni-timeline');
        const uniTimestamp = document.getElementById('uni-timestamp');
        const uniStatus = document.getElementById('uni-status');
        const playBtn = document.getElementById('uni-play-btn');
        const speedBtn = document.getElementById('uni-speed-btn');
        const layerRadarCheckbox = document.getElementById('layer-radar');
        const layerCloudsCheckbox = document.getElementById('layer-clouds');

        let radarFrames = [];
        let cloudFrames = [];
        let playInterval = null;
        let currentSpeedIdx = 0;
        
        const speeds = [
            { label: '1x', tickMs: 100, stepSec: 60 },
            { label: '2x', tickMs: 50, stepSec: 60 },
            { label: '0.5x', tickMs: 200, stepSec: 60 }
        ];

        function syncTimelineState() {
            const val = parseInt(uniTimeline.value);
            const max = parseInt(uniTimeline.max);
            
            window.isLive = (val >= max - 60);

            if (window.isLive && !window.isPlaying) {
                window.unifiedTimeMs = Date.now();
                uniStatus.innerText = 'LIVE';
                uniStatus.style.color = '#10b981';
            } else {
                window.unifiedTimeMs = val * 1000;
                const minsAgo = Math.floor((max - val) / 60);
                uniStatus.innerText = `-${minsAgo} MIN`;
                uniStatus.style.color = 'var(--text-mute)';
            }

            const date = new Date(window.unifiedTimeMs);
            uniTimestamp.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

            updateRadarVisuals();
        }

        function updateRadarVisuals() {
            if (radarFrames.length > 0) {
                let activeFrame = radarFrames[0];
                for (let i = 0; i < radarFrames.length; i++) {
                    if (radarFrames[i].time <= window.unifiedTimeMs / 1000) {
                        activeFrame = radarFrames[i];
                    } else break;
                }

                if (!radarLayers[activeFrame.path]) {
                    const url = `/api/radar/tile${activeFrame.path}/512/{z}/{x}/{y}/2/1_1.png`;
                    radarLayers[activeFrame.path] = L.tileLayer(url, { opacity: 0, maxNativeZoom: 3, transparent: true, className: 'pixelated-layer', zIndex: 10 }).addTo(map);
                }

                if (currentFramePath && currentFramePath !== activeFrame.path && radarLayers[currentFramePath]) {
                    radarLayers[currentFramePath].setOpacity(0);
                }

                currentFramePath = activeFrame.path;
                
                if (layerRadarCheckbox.checked) {
                    radarLayers[activeFrame.path].setOpacity(0.65);
                }
            }

            if (cloudFrames.length > 0) {
                let activeCloud = cloudFrames[0];
                for (let i = 0; i < cloudFrames.length; i++) {
                    if (cloudFrames[i].time <= window.unifiedTimeMs / 1000) {
                        activeCloud = cloudFrames[i];
                    } else break;
                }

                if (!cloudLayers[activeCloud.path]) {
                    const url = `/api/radar/tile${activeCloud.path}/512/{z}/{x}/{y}/0/0_0.png`;
                    cloudLayers[activeCloud.path] = L.tileLayer(url, { opacity: 0, maxNativeZoom: 3, transparent: true, className: 'pixelated-layer', zIndex: 5 }).addTo(map);
                }

                if (currentCloudFramePath && currentCloudFramePath !== activeCloud.path && cloudLayers[currentCloudFramePath]) {
                    cloudLayers[currentCloudFramePath].setOpacity(0);
                }

                currentCloudFramePath = activeCloud.path;
                
                if (layerCloudsCheckbox.checked) {
                    cloudLayers[activeCloud.path].setOpacity(0.4);
                }
            }
        }

        async function fetchRadarData() {
            try {
                const res = await fetch('/api/radar/metadata');
                const data = await res.json();
                const newFrames = data.radar.past;
                const newClouds = data.satellite && data.satellite.infrared ? data.satellite.infrared : [];

                if (radarFrames.length === 0) {
                    radarFrames = newFrames;
                    cloudFrames = newClouds;
                    
                    const minTime = radarFrames[0].time;
                    const maxTime = Math.floor(Date.now() / 1000);
                    
                    uniTimeline.min = minTime;
                    uniTimeline.max = maxTime;
                    uniTimeline.value = maxTime;
                    uniTimeline.disabled = false;
                    playBtn.disabled = false;
                    speedBtn.disabled = false;
                    
                    syncTimelineState();
                } else if (newFrames[newFrames.length - 1].time > radarFrames[radarFrames.length - 1].time) {
                    const wasLive = parseInt(uniTimeline.value) >= parseInt(uniTimeline.max) - 60;
                    radarFrames = newFrames;
                    cloudFrames = newClouds;
                    uniTimeline.max = Math.floor(Date.now() / 1000);
                    
                    const activePaths = radarFrames.map(f => f.path);
                    for (const path in radarLayers) {
                        if (!activePaths.includes(path)) {
                            map.removeLayer(radarLayers[path]);
                            delete radarLayers[path];
                        }
                    }

                    const activeCloudPaths = cloudFrames.map(f => f.path);
                    for (const path in cloudLayers) {
                        if (!activeCloudPaths.includes(path)) {
                            map.removeLayer(cloudLayers[path]);
                            delete cloudLayers[path];
                        }
                    }

                    if (wasLive && !window.isPlaying) {
                        uniTimeline.value = uniTimeline.max;
                        syncTimelineState();
                    }
                }
            } catch (err) {
                console.error("Radar sync error:", err);
            }
        }
        
        fetchRadarData();
        setInterval(() => {
            if (radarFrames.length > 0) {
                const nowSec = Math.floor(Date.now() / 1000);
                uniTimeline.max = nowSec;
                if (window.isLive && !window.isPlaying) {
                    uniTimeline.value = nowSec;
                    window.unifiedTimeMs = Date.now();
                    const date = new Date(window.unifiedTimeMs);
                    uniTimestamp.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                }
            }
        }, 1000);
        setInterval(fetchRadarData, 120000);

        uniTimeline.addEventListener('input', () => {
            if (window.isPlaying) stopLoop();
            syncTimelineState();
        });

        layerRadarCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                updateRadarVisuals();
            } else {
                if (currentFramePath && radarLayers[currentFramePath]) {
                    radarLayers[currentFramePath].setOpacity(0);
                }
            }
        });

        layerCloudsCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                updateRadarVisuals();
            } else {
                if (currentCloudFramePath && cloudLayers[currentCloudFramePath]) {
                    cloudLayers[currentCloudFramePath].setOpacity(0);
                }
            }
        });

        function runLoop() {
            if (playInterval) clearInterval(playInterval);
            window.isPlaying = true;
            playBtn.innerText = '❚❚ Pause';
            
            const speed = speeds[currentSpeedIdx];
            playInterval = setInterval(() => {
                let next = parseInt(uniTimeline.value) + speed.stepSec;
                if (next > parseInt(uniTimeline.max)) {
                    next = parseInt(uniTimeline.min);
                }
                uniTimeline.value = next;
                syncTimelineState();
            }, speed.tickMs);
        }

        function stopLoop() {
            window.isPlaying = false;
            playBtn.innerText = '▶ Play';
            clearInterval(playInterval);
            syncTimelineState();
        }

        playBtn.addEventListener('click', () => window.isPlaying ? stopLoop() : runLoop());
        
        speedBtn.addEventListener('click', () => {
            currentSpeedIdx = (currentSpeedIdx + 1) % speeds.length;
            speedBtn.innerText = speeds[currentSpeedIdx].label;
            if (window.isPlaying) runLoop(); 
        });
    </script>
</body>
</html>
